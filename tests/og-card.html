<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: radial-gradient(120% 120% at 22% 18%, #1e293b 0%, #0f172a 55%, #0b1120 100%);
    color: #fff; display: flex; align-items: center; overflow: hidden;
  }
  .wrap { display: flex; align-items: center; width: 100%; padding: 0 90px; gap: 48px; }
  .left { flex: 1; }
  .pill {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
    padding: 10px 20px; border-radius: 999px; font-size: 24px; font-weight: 600; color: #cbd5e1;
    margin-bottom: 30px;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: #34d399; box-shadow: 0 0 12px #34d39990; }
  .brand { font-size: 138px; font-weight: 800; letter-spacing: -4px; line-height: 1; }
  .tag { font-size: 42px; font-weight: 600; color: #e2e8f0; margin-top: 20px; letter-spacing: -1px; line-height: 1.3; }
  .chips { display: flex; gap: 14px; margin-top: 40px; flex-wrap: nowrap; }
  .chip {
    padding: 13px 24px; border-radius: 16px; font-size: 26px; font-weight: 600; color: #cbd5e1;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09); white-space: nowrap;
  }
  .chip.accent { background: rgba(99,102,241,.16); border-color: rgba(129,140,248,.4); color: #c7d2fe; }
  .mascot { width: 400px; height: 500px; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
  .mascot::before {
    content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,.22), transparent 70%); filter: blur(12px);
  }
  .mascot img { position: relative; height: 470px; width: auto; object-fit: contain; image-rendering: auto; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="pill"><span class="dot"></span> 실시간 수업 참여 플랫폼</div>
      <div class="brand">Pick</div>
      <div class="tag">질문 하나로 모두가 참여하는 수업</div>
      <div class="chips">
        <span class="chip">투표</span>
        <span class="chip">퀴즈</span>
        <span class="chip">워드클라우드</span>
        <span class="chip accent">Q&amp;A</span>
      </div>
    </div>
    <div class="mascot">
      <img src="../public/mascot.png" alt="Pick 마스코트" />
    </div>
  </div>
</body>
</html>
