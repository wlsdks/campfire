<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: radial-gradient(120% 120% at 22% 18%, #1e293b 0%, #0f172a 55%, #0b1120 100%);
    color: #fff; display: flex; align-items: center; overflow: hidden;
  }
  .wrap { display: flex; align-items: center; width: 100%; padding: 0 96px; gap: 40px; }
  .left { flex: 1; }
  .pill {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
    padding: 10px 20px; border-radius: 999px; font-size: 24px; font-weight: 600; color: #cbd5e1;
    margin-bottom: 30px;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: #34d399; box-shadow: 0 0 12px #34d39990; }
  .brand { font-size: 132px; font-weight: 800; letter-spacing: -4px; line-height: 1; }
  .tag { font-size: 44px; font-weight: 600; color: #e2e8f0; margin-top: 18px; letter-spacing: -1px; }
  .chips { display: flex; gap: 14px; margin-top: 40px; }
  .chip {
    padding: 13px 26px; border-radius: 16px; font-size: 27px; font-weight: 600; color: #cbd5e1;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09);
  }
  .chip.accent { background: rgba(99,102,241,.16); border-color: rgba(129,140,248,.4); color: #c7d2fe; }
  .mascot { width: 380px; height: 380px; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
  .mascot::before {
    content: ''; position: absolute; width: 320px; height: 320px; border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,.22), transparent 70%); filter: blur(8px);
  }
  .mascot svg { position: relative; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="pill"><span class="dot"></span> 실시간 수업 참여 플랫폼</div>
      <div class="brand">Pick</div>
      <div class="tag">질문 하나로, 300명이 함께</div>
      <div class="chips">
        <span class="chip">투표</span>
        <span class="chip">퀴즈</span>
        <span class="chip">워드클라우드</span>
        <span class="chip accent">Q&amp;A</span>
      </div>
    </div>
    <div class="mascot">
      <svg viewBox="0 0 120 120" width="360" height="360" fill="none">
        <defs>
          <radialGradient id="mane" cx="50%" cy="38%" r="55%"><stop offset="0%" stop-color="#FCD34D"/><stop offset="100%" stop-color="#F59E0B"/></radialGradient>
          <radialGradient id="face" cx="42%" cy="36%" r="65%"><stop offset="0%" stop-color="#FFF8E7"/><stop offset="50%" stop-color="#FEF3C7"/><stop offset="100%" stop-color="#FDE68A"/></radialGradient>
          <radialGradient id="nose" cx="50%" cy="25%" r="75%"><stop offset="0%" stop-color="#E8A87C"/><stop offset="100%" stop-color="#C47A08"/></radialGradient>
          <radialGradient id="blush"><stop offset="0%" stop-color="#F9A8D4" stop-opacity="0.5"/><stop offset="100%" stop-color="#F9A8D4" stop-opacity="0"/></radialGradient>
          <radialGradient id="ear" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#FECDD3" stop-opacity="0.6"/><stop offset="100%" stop-color="#FDE68A"/></radialGradient>
          <radialGradient id="eyeShine" cx="35%" cy="30%" r="60%"><stop offset="0%" stop-color="#1E293B"/><stop offset="100%" stop-color="#334155"/></radialGradient>
        </defs>
        <circle cx="60" cy="26" r="18" fill="url(#mane)"/><circle cx="34" cy="33" r="17" fill="url(#mane)"/><circle cx="86" cy="33" r="17" fill="url(#mane)"/>
        <circle cx="24" cy="52" r="16" fill="url(#mane)"/><circle cx="96" cy="52" r="16" fill="url(#mane)"/><circle cx="26" cy="73" r="15" fill="url(#mane)"/>
        <circle cx="94" cy="73" r="15" fill="url(#mane)"/><circle cx="38" cy="89" r="14" fill="url(#mane)"/><circle cx="82" cy="89" r="14" fill="url(#mane)"/>
        <circle cx="60" cy="93" r="14" fill="url(#mane)"/><circle cx="60" cy="58" r="40" fill="url(#mane)"/>
        <circle cx="60" cy="62" r="32" fill="url(#face)"/>
        <circle cx="33" cy="33" r="10" fill="url(#mane)"/><circle cx="33" cy="33" r="6" fill="url(#ear)"/><circle cx="87" cy="33" r="10" fill="url(#mane)"/><circle cx="87" cy="33" r="6" fill="url(#ear)"/>
        <ellipse cx="47" cy="57" rx="9" ry="9.5" fill="white"/><ellipse cx="47" cy="58" rx="6.5" ry="7" fill="url(#eyeShine)"/><circle cx="44" cy="54.5" r="3" fill="white"/><circle cx="50" cy="59" r="1.5" fill="white" opacity="0.6"/>
        <ellipse cx="73" cy="57" rx="9" ry="9.5" fill="white"/><ellipse cx="73" cy="58" rx="6.5" ry="7" fill="url(#eyeShine)"/><circle cx="70" cy="54.5" r="3" fill="white"/><circle cx="76" cy="59" r="1.5" fill="white" opacity="0.6"/>
        <ellipse cx="60" cy="66" rx="3" ry="2.3" fill="url(#nose)"/><ellipse cx="59.2" cy="65.3" rx="1.3" ry="0.8" fill="white" opacity="0.35"/>
        <path d="M52 70 Q60 79 68 70" stroke="#C47A08" stroke-width="2" stroke-linecap="round" fill="none"/>
        <ellipse cx="60" cy="76" rx="3.5" ry="2.5" fill="#F9A8D4" opacity="0.7"/>
        <circle cx="35" cy="67" r="9" fill="url(#blush)"/><circle cx="85" cy="67" r="9" fill="url(#blush)"/>
      </svg>
    </div>
  </div>
</body>
</html>
